{% if error %}
  <div class="mb-3 rounded-md border border-rose-700/60 bg-rose-900/30 p-2 text-xs text-rose-100">{{ error }}</div>
{% endif %}

{% if filaments %}
  <ul class="space-y-2">
    {% for filament in filaments %}
      {% set selected = selected_filament_id == filament.id %}
      <li>
        <button
          class="flex w-full items-center justify-between rounded-md border px-3 py-2 text-left transition {% if selected %}border-cyan-500 bg-cyan-950/40{% else %}border-slate-700 hover:bg-slate-800{% endif %}"
          hx-get="/web/filament/{{ filament.id }}?machine={{ machine_id }}"
          hx-target="#filament-detail"
        >
          <span class="min-w-0">
            <span class="flex items-center gap-2">
              <span class="inline-block h-3 w-3 rounded-full border border-black/30" style="background: {{ filament.color_css }}"></span>
              <span class="truncate text-sm font-medium">{{ filament.display_name }}</span>
            </span>
            <span class="block truncate text-xs text-slate-400">{{ filament.material or "Unknown material" }}</span>
          </span>
          {% if filament.is_linked %}
            <span class="rounded-full border border-emerald-600/70 bg-emerald-900/40 px-2 py-0.5 text-[10px] uppercase tracking-wide text-emerald-200">Linked</span>
          {% endif %}
        </button>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <div class="rounded-md border border-dashed border-slate-700 p-4 text-sm text-slate-400">No filaments found.</div>
{% endif %}
