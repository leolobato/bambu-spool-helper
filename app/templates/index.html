{% extends "base.html" %}

{% block content %}
<div class="grid h-full grid-cols-1 gap-4 lg:grid-cols-[360px_1fr]">
  <aside class="flex min-h-0 flex-col rounded-xl border border-slate-800 bg-panel p-3">
    <div class="mb-3 grid grid-cols-3 gap-2 text-sm">
      <button
        class="rounded-md border border-slate-700 px-2 py-1.5 hover:bg-slate-800"
        onclick="document.getElementById('filter-mode').value='all'"
        hx-get="/web/filaments?filter=all"
        hx-target="#filament-list"
        hx-include="#filament-search"
      >All</button>
      <button
        class="rounded-md border border-slate-700 px-2 py-1.5 hover:bg-slate-800"
        onclick="document.getElementById('filter-mode').value='linked'"
        hx-get="/web/filaments?filter=linked"
        hx-target="#filament-list"
        hx-include="#filament-search"
      >Linked</button>
      <button
        class="rounded-md border border-slate-700 px-2 py-1.5 hover:bg-slate-800"
        onclick="document.getElementById('filter-mode').value='unlinked'"
        hx-get="/web/filaments?filter=unlinked"
        hx-target="#filament-list"
        hx-include="#filament-search"
      >Unlinked</button>
    </div>

    <input type="hidden" id="filter-mode" name="filter" value="{{ filter_mode }}" />

    <input
      id="filament-search"
      name="search"
      type="search"
      value="{{ search }}"
      placeholder="Search by vendor, name, or material"
      class="mb-3 w-full rounded-md border-slate-700 bg-slate-900 text-sm text-ink"
      hx-get="/web/filaments"
      hx-trigger="input changed delay:250ms"
      hx-target="#filament-list"
      hx-include="#filter-mode"
    />

    <div id="filament-list" class="min-h-0 flex-1 overflow-y-auto">
      {% include "partials/filament_list.html" %}
    </div>
  </aside>

  <section id="filament-detail" class="min-h-0 overflow-y-auto rounded-xl border border-slate-800 bg-panel p-4">
    {% if filament %}
      {% include "partials/filament_detail.html" %}
    {% else %}
      <div class="rounded-lg border border-dashed border-slate-700 p-6 text-sm text-slate-400">
        Select a filament to view details and link it to a Bambu profile.
      </div>
    {% endif %}
  </section>
</div>
{% endblock %}
